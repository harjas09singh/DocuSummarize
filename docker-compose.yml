version: '3.8'

services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION_NAME=documents
      - DEBUG=False
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    depends_on:
      - qdrant
    networks:
      - docusummarize-network
    command: python app.py

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-admin}
    networks:
      - docusummarize-network

volumes:
  qdrant_storage:

networks:
  docusummarize-network:
    driver: bridge
      